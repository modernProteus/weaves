name: Spark
description: Four fields. Fire and forget.
title: "Thread: "
labels: ["cq", "thread"]
body:
  - type: input
    id: spark_title
    attributes:
      label: Title
      placeholder: Identity Fusion
    validations: { required: true }

  - type: input
    id: read_url
    attributes:
      label: Link
      placeholder: https://
    validations: { required: true }

  - type: textarea
    id: hook
    attributes:
      label: The question
      description: The line they see under the link in Messages. One sentence.
      placeholder: Why does making someone feel personally threatened make them more loyal to the group, not less?
    validations: { required: true }

  - type: input
    id: from
    attributes:
      label: From
      description: nick or jeremy
      value: nick
    validations: { required: true }

  - type: markdown
    attributes:
      value: "Everything else — why, trap terms, what sparked it, source line — can be added later by editing the JSON, or use the **Spark (full)** template instead."
