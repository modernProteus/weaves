name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      # its own Python, so pip isn't fighting the runner's externally-managed one
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - run: node build.mjs

      # per-node preview cards: title and question composited onto the drawing.
      # runs after build.mjs, which wipes dist/ before writing.
      - name: Preview cards
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow
          python tools/make_cards.py
          echo "--- generated ---"
          find dist -name card.png -print

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: dist }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
